name: Build

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'
      - 'MODULE.bazel'
      - 'BUILD.bazel'
      - '**/BUILD.bazel'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'
      - 'MODULE.bazel'
      - 'BUILD.bazel'
      - '**/BUILD.bazel'

jobs:
  build:
    name: Build Binary and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web-app/package-lock.json

    - name: Install buf
      run: go install github.com/bufbuild/buf/cmd/buf@latest

    - name: Install Bazelisk
      run: |
        # Install Bazelisk from GitHub releases (works on all platforms)
        curl -fsSL https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-${{ matrix.goarch == 'arm64' && 'arm64' || 'amd64' }} -o /usr/local/bin/bazel
        chmod +x /usr/local/bin/bazel
        # For macOS, download the darwin version
        if [ "${{ matrix.goos }}" = "darwin" ]; then
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-darwin-${{ matrix.goarch == 'arm64' && 'arm64' || 'amd64' }} -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel
        fi

    - name: Generate protobuf code
      run: make proto-gen

    - name: Build web UI
      run: make web-build

    - name: Run tests
      run: go test -v ./...

    - name: Build with Bazel
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        BINARY_NAME=stapler-squad
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME=$BINARY_NAME.exe
        fi
        bazel build //:stapler-squad
        mkdir -p build/${{ matrix.goos }}_${{ matrix.goarch }}
        cp bazel-bin/stapler-squad_/stapler-squad build/${{ matrix.goos }}_${{ matrix.goarch }}/$BINARY_NAME

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stapler-squad-${{ matrix.goos }}-${{ matrix.goarch }}
        path: build/${{ matrix.goos }}_${{ matrix.goarch }}/*
        retention-days: 7
