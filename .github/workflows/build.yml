name: Build

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'
      - 'MODULE.bazel'
      - 'BUILD.bazel'
      - '**/BUILD.bazel'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'
      - 'MODULE.bazel'
      - 'BUILD.bazel'
      - '**/BUILD.bazel'

jobs:
  build:
    name: Build Binary and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        include:
          - goos: linux
            goarch: amd64
            bazel_platform: linux_amd64
          - goos: linux
            goarch: arm64
            bazel_platform: linux_arm64
          - goos: darwin
            goarch: amd64
            bazel_platform: darwin_amd64
          - goos: darwin
            goarch: arm64
            bazel_platform: darwin_arm64
          - goos: windows
            goarch: amd64
            bazel_platform: windows_amd64
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web-app/package-lock.json

    - name: Install buf
      run: go install github.com/bufbuild/buf/cmd/buf@latest

    - name: Install Bazelisk
      run: |
        # Install Bazelisk from GitHub releases (works on all platforms)
        # Always use amd64 Bazelisk - Bazel itself handles cross-compilation
        mkdir -p "$HOME/bin"
        OS="${{ matrix.goos }}"
        if [ "$OS" = "windows" ]; then
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-windows-amd64.exe -o "$HOME/bin/bazel.exe"
        else
          curl -fsSL "https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-${OS}-amd64" -o "$HOME/bin/bazel"
          chmod +x "$HOME/bin/bazel"
        fi
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Generate protobuf code
      run: make proto-gen

    - name: Build web UI
      run: make web-build

    - name: Run tests
      run: go test -short ./...

    - name: Build with Bazel
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        BINARY_NAME=stapler-squad
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME=$BINARY_NAME.exe
        fi
        bazel build //:stapler-squad
        mkdir -p build/${{ matrix.goos }}_${{ matrix.goarch }}
        cp bazel-bin/stapler-squad_/stapler-squad build/${{ matrix.goos }}_${{ matrix.goarch }}/$BINARY_NAME

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stapler-squad-${{ matrix.goos }}-${{ matrix.goarch }}
        path: build/${{ matrix.goos }}_${{ matrix.goarch }}/*
        retention-days: 7
