syntax = "proto3";

package session.v1;

import "google/protobuf/timestamp.proto";

// Session represents a running AI agent instance with its associated state.
// Maps to session.Instance in the Go codebase.
message Session {
  // Unique identifier (uses title as ID for now).
  string id = 1;

  // Human-readable session title.
  string title = 2;

  // Path to workspace repository root.
  string path = 3;

  // Directory within repository to start in.
  string working_dir = 4;

  // Git branch name for this session.
  string branch = 5;

  // Current session status.
  SessionStatus status = 6;

  // Program running in session (e.g., "claude", "aider").
  string program = 7;

  // Terminal dimensions.
  int32 height = 8;
  int32 width = 9;

  // Timestamps.
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;

  // Terminal activity timestamps for staleness detection.
  // Last time any terminal output was received (including tmux banners).
  google.protobuf.Timestamp last_terminal_update = 22;
  // Last time meaningful terminal output was received (excluding tmux banners).
  // Used by review queue to detect stale sessions.
  google.protobuf.Timestamp last_meaningful_output = 23;

  // Auto-approve prompts without user interaction.
  bool auto_yes = 12;

  // Initial prompt passed on startup.
  string prompt = 13;

  // Path to existing worktree (if reusing).
  string existing_worktree = 14;

  // Category for organization.
  string category = 15;

  // Whether category is expanded in UI.
  bool is_expanded = 16;

  // Session type (directory, new_worktree, existing_worktree).
  SessionType session_type = 17;

  // Tmux session prefix for isolation.
  string tmux_prefix = 18;

  // Git diff statistics.
  DiffStats diff_stats = 19;

  // Git worktree information.
  GitWorktree git_worktree = 20;

  // Claude Code session persistence data.
  ClaudeSession claude_session = 21;

  // Tags for flexible multi-dimensional organization.
  // Replaces single-category hierarchy with tag-based grouping.
  repeated string tags = 24;

  // GitHub integration fields for PR/URL-based session creation.
  // These fields track sessions created from GitHub PRs or repository URLs.

  // GitHub pull request number (0 if not created from PR).
  int32 github_pr_number = 25;

  // Full URL to the GitHub pull request.
  string github_pr_url = 26;

  // Repository owner (GitHub user or organization).
  string github_owner = 27;

  // Repository name.
  string github_repo = 28;

  // Original URL or reference used to create this session.
  // Could be a PR URL, repository URL, or git URL.
  string github_source_ref = 29;

  // Path where repository was cloned (for URL-based sessions).
  // Empty if session uses existing repository.
  string cloned_repo_path = 30;

  // Instance type - indicates whether this is a managed or external session
  InstanceType instance_type = 31;

  // External instance metadata (only populated for external sessions)
  ExternalInstanceMetadata external_metadata = 32;
}

// SessionStatus represents the current state of a session.
// Maps to session.Status enum in Go.
enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  // Session is running and agent is working.
  SESSION_STATUS_RUNNING = 1;
  // Agent is ready for user input (waiting).
  SESSION_STATUS_READY = 2;
  // Session is loading/starting up.
  SESSION_STATUS_LOADING = 3;
  // Session is paused (worktree removed but branch preserved).
  SESSION_STATUS_PAUSED = 4;
  // Session needs user approval on a prompt.
  SESSION_STATUS_NEEDS_APPROVAL = 5;
}

// SessionType determines the session workflow.
enum SessionType {
  SESSION_TYPE_UNSPECIFIED = 0;
  // Work in existing directory without worktree.
  SESSION_TYPE_DIRECTORY = 1;
  // Create new git worktree with new branch.
  SESSION_TYPE_NEW_WORKTREE = 2;
  // Reuse existing git worktree.
  SESSION_TYPE_EXISTING_WORKTREE = 3;
}

// InstanceType indicates whether a session is managed by claude-squad or external.
enum InstanceType {
  INSTANCE_TYPE_UNSPECIFIED = 0;
  // Session fully managed by claude-squad with complete lifecycle control.
  INSTANCE_TYPE_MANAGED = 1;
  // Session discovered externally (e.g., via claude-mux) with limited interaction.
  INSTANCE_TYPE_EXTERNAL = 2;
}

// ExternalInstanceMetadata contains metadata for externally discovered sessions.
message ExternalInstanceMetadata {
  // Tmux server socket (empty = default tmux server)
  string tmux_socket = 1;

  // Full tmux session name
  string tmux_session_name = 2;

  // When this instance was first discovered
  google.protobuf.Timestamp discovered_at = 3;

  // When this instance was last seen during discovery
  google.protobuf.Timestamp last_seen = 4;

  // Original process ID when first discovered
  int32 original_pid = 5;

  // Path to claude-mux Unix domain socket (if mux-enabled)
  string mux_socket_path = 6;

  // Whether this instance supports mux protocol for bidirectional terminal access
  bool mux_enabled = 7;

  // Source terminal that spawned this Claude session (e.g., "IntelliJ", "VSCode", "Terminal")
  string source_terminal = 8;
}

// DiffStats contains git diff statistics for a session.
// Maps to git.DiffStats in Go.
message DiffStats {
  // Number of lines added.
  int32 added = 1;

  // Number of lines removed.
  int32 removed = 2;

  // Full unified diff content.
  string content = 3;
}

// GitWorktree contains git worktree information for a session.
// Maps to git.GitWorktree in Go.
message GitWorktree {
  // Path to original repository.
  string repo_path = 1;

  // Path to worktree directory.
  string worktree_path = 2;

  // Session name associated with worktree.
  string session_name = 3;

  // Branch name in worktree.
  string branch_name = 4;

  // Base commit SHA when worktree was created.
  string base_commit_sha = 5;
}

// ClaudeSession contains Claude Code session persistence information.
// Allows resuming/reattaching to existing Claude Code sessions.
message ClaudeSession {
  // Claude Code session identifier.
  string session_id = 1;

  // Conversation thread ID.
  string conversation_id = 2;

  // Project name in Claude Code.
  string project_name = 3;

  // Last time session was attached/used.
  google.protobuf.Timestamp last_attached = 4;

  // User preferences for Claude Code integration.
  ClaudeSettings settings = 5;

  // Additional session metadata.
  map<string, string> metadata = 6;
}

// ClaudeSettings contains user preferences for Claude Code integration.
message ClaudeSettings {
  // Automatically reattach to last session on resume.
  bool auto_reattach = 1;

  // Preferred session naming pattern.
  string preferred_session_name = 2;

  // Create new session if previous one is missing.
  bool create_new_on_missing = 3;

  // Show session selection menu on resume.
  bool show_session_selector = 4;

  // Consider sessions stale after this time (minutes).
  int32 session_timeout_minutes = 5;
}

// ReviewItem represents a session that needs user attention.
// Maps to session.ReviewItem in Go.
message ReviewItem {
  // Unique session identifier (uses session title).
  string session_id = 1;

  // Human-readable session name.
  string session_name = 2;

  // Reason why session needs attention.
  AttentionReason reason = 3;

  // Priority level for ordering in queue.
  Priority priority = 4;

  // When this item was detected as needing attention.
  google.protobuf.Timestamp detected_at = 5;

  // Additional context about why attention is needed.
  string context = 6;

  // Name of detection pattern that triggered this item.
  string pattern_name = 7;

  // Additional metadata key-value pairs.
  map<string, string> metadata = 8;

  // Session details for rich display (matching Session message fields)
  // Program running in session (e.g., "claude", "aider").
  string program = 9;

  // Git branch name for this session.
  string branch = 10;

  // Path to workspace repository root.
  string path = 11;

  // Directory within repository to start in.
  string working_dir = 12;

  // Current session status.
  SessionStatus status = 13;

  // Tags for flexible multi-dimensional organization.
  repeated string tags = 14;

  // Category for organization.
  string category = 15;

  // Git diff statistics.
  DiffStats diff_stats = 16;

  // Last time meaningful terminal output was received (excluding tmux banners).
  // This is the actual last activity time, used for sorting and display.
  // Used instead of detected_at for showing when the session was last active.
  google.protobuf.Timestamp last_activity = 17;
}

// Priority levels for review queue items (highest to lowest urgency).
enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  // 🔴 Critical - requires immediate attention (errors, failures).
  PRIORITY_URGENT = 1;
  // 🟡 Important - needs attention soon (approvals, prompts).
  PRIORITY_HIGH = 2;
  // 🔵 Normal - routine attention needed (idle, waiting).
  PRIORITY_MEDIUM = 3;
  // ⚪ Low - informational (task complete, status change).
  PRIORITY_LOW = 4;
}

// AttentionReason indicates why a session needs user attention.
enum AttentionReason {
  ATTENTION_REASON_UNSPECIFIED = 0;
  // Session is waiting for user approval on a prompt.
  ATTENTION_REASON_APPROVAL_PENDING = 1;
  // Session needs user input to continue.
  ATTENTION_REASON_INPUT_REQUIRED = 2;
  // Session encountered an error state.
  ATTENTION_REASON_ERROR_STATE = 3;
  // Session has been idle for too long.
  ATTENTION_REASON_IDLE_TIMEOUT = 4;
  // Session completed a task and is ready for next steps.
  ATTENTION_REASON_TASK_COMPLETE = 5;
}

// PRInfo contains metadata about a GitHub pull request.
// Used when creating sessions from PR URLs to provide rich context.
message PRInfo {
  // Pull request number.
  int32 number = 1;

  // PR title.
  string title = 2;

  // PR description/body.
  string body = 3;

  // Head branch reference (source branch).
  string head_ref = 4;

  // Base branch reference (target branch).
  string base_ref = 5;

  // Current PR state (open, closed, merged).
  string state = 6;

  // PR author username.
  string author = 7;

  // Labels applied to PR.
  repeated string labels = 8;

  // HTML URL to view PR on GitHub.
  string html_url = 9;

  // Whether PR is marked as draft.
  bool is_draft = 10;

  // Mergeable status (mergeable, conflicting, unknown).
  string mergeable = 11;

  // Number of lines added.
  int32 additions = 12;

  // Number of lines deleted.
  int32 deletions = 13;

  // Number of files changed.
  int32 changed_files = 14;

  // PR creation timestamp.
  google.protobuf.Timestamp created_at = 15;

  // PR last updated timestamp.
  google.protobuf.Timestamp updated_at = 16;
}

// PRComment represents a comment on a GitHub pull request.
message PRComment {
  // Comment ID.
  int32 id = 1;

  // Comment author username.
  string author = 2;

  // Comment body text.
  string body = 3;

  // Comment creation timestamp.
  google.protobuf.Timestamp created_at = 4;

  // File path (for review comments only).
  optional string path = 5;

  // Line number (for review comments only).
  optional int32 line = 6;

  // Whether this is a review comment (vs general comment).
  bool is_review = 7;
}

// ReviewQueue contains statistics and items needing attention.
message ReviewQueue {
  // Total number of items in queue.
  int32 total_items = 1;

  // Items organized by priority (sorted highest to lowest).
  repeated ReviewItem items = 2;

  // Statistics by priority level.
  map<int32, int32> by_priority = 3;

  // Statistics by attention reason.
  map<int32, int32> by_reason = 4;

  // Average age of items in queue (seconds).
  int64 average_age_seconds = 5;

  // Oldest item session ID.
  string oldest_item_id = 6;

  // Age of oldest item (seconds).
  int64 oldest_age_seconds = 7;
}

// ============================================================================
// Notification Types for Cross-Process Event Broadcasting
// ============================================================================

// NotificationType categorizes the type of notification being sent.
// Different types have different default UI treatments.
enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;

  // User Action Required (High Priority by default)
  NOTIFICATION_TYPE_APPROVAL_NEEDED = 1;    // User approval dialog waiting
  NOTIFICATION_TYPE_INPUT_REQUIRED = 2;     // Waiting for user input
  NOTIFICATION_TYPE_CONFIRMATION_NEEDED = 3; // Confirmation prompt waiting

  // Status Updates (Medium Priority by default)
  NOTIFICATION_TYPE_TASK_COMPLETE = 4;      // Task finished successfully
  NOTIFICATION_TYPE_PROCESS_STARTED = 5;    // Long-running process started
  NOTIFICATION_TYPE_PROCESS_FINISHED = 6;   // Long-running process finished

  // Errors and Warnings (High/Urgent Priority by default)
  NOTIFICATION_TYPE_ERROR = 7;              // Error occurred
  NOTIFICATION_TYPE_WARNING = 8;            // Warning condition
  NOTIFICATION_TYPE_FAILURE = 9;            // Operation failed

  // Informational (Low Priority by default)
  NOTIFICATION_TYPE_INFO = 10;              // General information
  NOTIFICATION_TYPE_DEBUG = 11;             // Debug information
  NOTIFICATION_TYPE_STATUS_CHANGE = 12;     // Session status changed

  // Custom (Medium Priority by default)
  NOTIFICATION_TYPE_CUSTOM = 100;           // Custom notification type
}

// NotificationPriority determines UI treatment for notifications.
// Maps to different audio, visual styling, and auto-dismiss behavior.
enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  NOTIFICATION_PRIORITY_LOW = 1;       // Info, auto-dismiss after 5s
  NOTIFICATION_PRIORITY_MEDIUM = 2;    // Normal, auto-dismiss after 10s
  NOTIFICATION_PRIORITY_HIGH = 3;      // Important, requires acknowledgment
  NOTIFICATION_PRIORITY_URGENT = 4;    // Critical, blocking action required
}

// Notification represents a notification sent from a tmux session to the server.
message Notification {
  // Unique notification identifier (server-generated)
  string id = 1;

  // Session identifier that sent the notification
  string session_id = 2;

  // Session name for display
  string session_name = 3;

  // Type of notification
  NotificationType notification_type = 4;

  // Priority level (determines UI treatment)
  NotificationPriority priority = 5;

  // Human-readable title
  string title = 6;

  // Detailed message
  string message = 7;

  // When the notification was created
  google.protobuf.Timestamp timestamp = 8;

  // Optional metadata (key-value pairs for additional context)
  map<string, string> metadata = 9;
}

// VCSType represents the type of version control system
enum VCSType {
  VCS_TYPE_UNSPECIFIED = 0;
  VCS_TYPE_GIT = 1;
  VCS_TYPE_JUJUTSU = 2;
}

// FileStatus represents the status of a file in version control
enum FileStatus {
  FILE_STATUS_UNSPECIFIED = 0;
  FILE_STATUS_MODIFIED = 1;
  FILE_STATUS_ADDED = 2;
  FILE_STATUS_DELETED = 3;
  FILE_STATUS_RENAMED = 4;
  FILE_STATUS_COPIED = 5;
  FILE_STATUS_UNTRACKED = 6;
  FILE_STATUS_IGNORED = 7;
  FILE_STATUS_CONFLICT = 8;
}

// FileChange represents a changed file in the working directory
message FileChange {
  // File path relative to repository root
  string path = 1;

  // Type of change
  FileStatus status = 2;

  // Whether the change is staged for commit
  bool is_staged = 3;

  // Original path for renames/copies
  string old_path = 4;
}

// VCSStatus represents the current status of the version control system
message VCSStatus {
  // VCS type (git, jujutsu)
  VCSType type = 1;

  // Current branch name (Git) or bookmark (Jujutsu)
  string branch = 2;

  // Short SHA (Git) or change ID (Jujutsu)
  string head_commit = 3;

  // Commit message or change description
  string description = 4;

  // Commits ahead of upstream
  int32 ahead_by = 5;

  // Commits behind upstream
  int32 behind_by = 6;

  // Name of upstream branch/remote
  string upstream = 7;

  // Has staged changes
  bool has_staged = 8;

  // Has unstaged changes
  bool has_unstaged = 9;

  // Has untracked files
  bool has_untracked = 10;

  // Has merge/rebase conflicts
  bool has_conflicts = 11;

  // Working directory is clean
  bool is_clean = 12;

  // Staged files list
  repeated FileChange staged_files = 13;

  // Unstaged files list
  repeated FileChange unstaged_files = 14;

  // Untracked files list
  repeated FileChange untracked_files = 15;

  // Conflict files list
  repeated FileChange conflict_files = 16;
}
