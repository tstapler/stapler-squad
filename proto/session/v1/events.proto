syntax = "proto3";

package session.v1;

import "google/protobuf/timestamp.proto";
import "session/v1/types.proto";

// SessionEvent represents a real-time event about session state changes.
// Used for WatchSessions streaming RPC to push updates to clients.
message SessionEvent {
  // Timestamp when the event occurred
  google.protobuf.Timestamp timestamp = 1;

  // Event type (one of the following)
  oneof event {
    SessionCreatedEvent session_created = 2;
    SessionUpdatedEvent session_updated = 3;
    SessionDeletedEvent session_deleted = 4;
    SessionStatusChangedEvent status_changed = 5;
    UserInteractionEvent user_interaction = 6;
    SessionAcknowledgedEvent session_acknowledged = 7;
    ApprovalResponseEvent approval_response = 8;
    NotificationEvent notification = 9;
  }
}

// SessionCreatedEvent is emitted when a new session is created
message SessionCreatedEvent {
  Session session = 1;
}

// SessionUpdatedEvent is emitted when session properties are modified
message SessionUpdatedEvent {
  Session session = 1;
  // Fields that were updated (for efficient client updates)
  repeated string updated_fields = 2;
}

// SessionDeletedEvent is emitted when a session is deleted
message SessionDeletedEvent {
  string session_id = 1;
  string reason = 2; // Optional deletion reason
}

// SessionStatusChangedEvent is emitted when session status transitions
message SessionStatusChangedEvent {
  string session_id = 1;
  SessionStatus old_status = 2;
  SessionStatus new_status = 3;
}

// TerminalData represents terminal I/O for bidirectional streaming.
// Used for StreamTerminal RPC to provide real-time terminal access.
message TerminalData {
  // Session identifier
  string session_id = 1;

  // Terminal message type
  oneof data {
    TerminalOutput output = 2;
    TerminalInput input = 3;
    TerminalResize resize = 4;
    TerminalError error = 5;
    ScrollbackRequest scrollback_request = 6;
    ScrollbackResponse scrollback_response = 7;
    TerminalDelta delta = 8;  // Delta compression for efficient updates (DEPRECATED - use state)
    CurrentPaneRequest current_pane_request = 9;   // Request current tmux pane content
    CurrentPaneResponse current_pane_response = 10; // Response with current pane content (DEPRECATED - use state)
    FlowControl flow_control = 11;  // Flow control signals for backpressure management (xterm.js best practice)
    TerminalState state = 12;  // Complete terminal state (MOSH-style)
  }
}

// TerminalOutput contains data from the terminal (server to client)
message TerminalOutput {
  bytes data = 1; // Raw terminal output bytes (ANSI escape codes, etc)
}

// TerminalInput contains user input for the terminal (client to server)
message TerminalInput {
  bytes data = 1; // Raw input bytes (keystrokes, etc)
}

// TerminalResize notifies of terminal dimension changes
message TerminalResize {
  int32 rows = 1;
  int32 cols = 2;
}

// TerminalError indicates a terminal streaming error
message TerminalError {
  string message = 1;
  string code = 2; // Error code (e.g., "session_not_found", "tmux_error")
}

// FlowControl manages backpressure between client and server for terminal streaming.
// Implements watermark-based flow control following xterm.js best practices.
//
// Reference: https://xtermjs.org/docs/guides/flowcontrol/
//
// How it works:
// 1. Client tracks watermark (bytes queued in xterm.js write buffer)
// 2. When watermark exceeds HIGH threshold (100KB), client sends pause=true
// 3. Server stops reading from PTY and buffers data
// 4. When watermark drops below LOW threshold (10KB), client sends pause=false
// 5. Server resumes reading from PTY
//
// This prevents:
// - Browser tab crashes from memory exhaustion
// - Terminal rendering lag from write queue backup
// - Lost data from WebSocket buffer overflow
message FlowControl {
  // If true, server should pause PTY output (HIGH watermark exceeded)
  // If false, server should resume PTY output (LOW watermark reached)
  bool paused = 1;

  // Current watermark value in bytes (optional, for server-side metrics/debugging)
  // Watermark = bytes queued in xterm.js but not yet parsed/rendered
  optional uint64 watermark = 2;
}

// ScrollbackRequest requests historical terminal scrollback
message ScrollbackRequest {
  uint64 from_sequence = 1; // Start from this sequence (0 for latest)
  int32 limit = 2;           // Maximum number of lines to return
}

// ScrollbackResponse contains historical terminal scrollback data
message ScrollbackResponse {
  repeated ScrollbackChunk chunks = 1; // Scrollback data chunks
  bool has_more = 2;                   // True if more data available
  uint64 total_lines = 3;              // Total lines available
  uint64 oldest_sequence = 4;          // Oldest sequence in storage
  uint64 newest_sequence = 5;          // Newest sequence in storage
}

// ScrollbackChunk represents a chunk of scrollback data
message ScrollbackChunk {
  bytes data = 1;            // Terminal output data
  uint64 sequence = 2;       // Sequence number for ordering
  int64 timestamp_ms = 3;    // Unix timestamp in milliseconds
}

// CurrentPaneRequest requests the current visible tmux pane content.
// This gives the exact content the user would see if they attached to tmux directly.
message CurrentPaneRequest {
  // Number of lines to capture from the bottom of the pane (default: 50)
  // If 0 or negative, captures the entire visible pane
  int32 lines = 1;

  // Include escape sequences for colors and formatting (default: true)
  bool include_escapes = 2;

  // Target terminal dimensions (optional)
  // If provided, server will resize tmux pane to match BEFORE capturing content
  // This prevents size mismatches between client's browser terminal and server's tmux pane
  optional int32 target_cols = 3;  // Target columns (width)
  optional int32 target_rows = 4;  // Target rows (height)

  // Streaming mode for terminal output (optional)
  // Options: "raw" (direct PTY bytes), "raw-compressed" (PTY bytes with LZMA),
  //          "state" (MOSH-style state sync), "hybrid" (both raw and state)
  // Default: "raw" if not specified
  optional string streaming_mode = 5;
}

// CurrentPaneResponse contains the current visible tmux pane content
message CurrentPaneResponse {
  // Raw terminal content from tmux capture-pane
  bytes content = 1;

  // Cursor position in the pane
  int32 cursor_x = 2;  // Column (0-based)
  int32 cursor_y = 3;  // Row (0-based)

  // Current pane dimensions
  int32 pane_width = 4;   // Columns
  int32 pane_height = 5;  // Rows
}

// ============================================================================
// Delta Compression Protocol (MOSH-style)
// ============================================================================

// TerminalDelta represents incremental terminal state changes.
// Inspired by MOSH protocol - only sends what changed in the terminal screen.
// Reduces bandwidth by 70-90% for typical terminal usage.
message TerminalDelta {
  // State version tracking for synchronization
  uint64 from_state = 1;     // Previous state version (0 for initial)
  uint64 to_state = 2;       // New state version after applying delta

  // Screen changes (only modified lines)
  repeated LineDelta lines = 3;

  // Cursor position after changes
  CursorPosition cursor = 4;

  // Full sync flag - if true, this is complete state (not a delta)
  // Used for initial sync or error recovery when client/server out of sync
  bool full_sync = 5;

  // Terminal dimensions (included if changed)
  optional TerminalDimensions dimensions = 6;
}

// LineDelta represents changes to a specific terminal line
message LineDelta {
  // Line number (0-based from top of screen)
  uint32 line_number = 1;

  // Operation to perform on this line
  oneof operation {
    bytes replace_line = 2;     // Replace entire line with this content (raw bytes with ANSI codes)
    LineEdit edit = 3;          // Character-level edit within line
    bool delete_line = 4;       // Delete this line (shifts lines up)
    InsertLine insert = 5;      // Insert new line (shifts lines down)
    bool clear_line = 6;        // Clear line to empty (optimization)
  }
}

// LineEdit represents a character-level edit within a line
message LineEdit {
  uint32 start_col = 1;  // Start column (0-based)
  uint32 end_col = 2;    // End column (exclusive, like string slice)
  bytes text = 3;        // Replacement text (raw bytes with ANSI codes)
}

// InsertLine represents insertion of a new line
message InsertLine {
  bytes text = 1;        // Line content (raw bytes with ANSI codes)
  bool at_cursor = 2;    // If true, insert at cursor; else at line_number
}

// CursorPosition tracks terminal cursor location
message CursorPosition {
  uint32 row = 1;        // Row number (0-based from top)
  uint32 col = 2;        // Column number (0-based from left)
  bool visible = 3;      // Cursor visibility flag
}

// TerminalDimensions represents terminal size
message TerminalDimensions {
  uint32 rows = 1;       // Number of rows
  uint32 cols = 2;       // Number of columns
}

// ============================================================================
// MOSH-Style State Synchronization Protocol (SSP)
// ============================================================================

// TerminalState represents complete terminal state using MOSH-style SSP.
// Unlike deltas, this contains the complete visible terminal screen state.
// Optimized with LZMA compression and dynamic dictionary learning.
message TerminalState {
  // State sequence number for idempotent updates
  uint64 sequence = 1;

  // Terminal dimensions
  TerminalDimensions dimensions = 2;

  // Complete screen buffer - array of terminal lines
  repeated TerminalLine lines = 3;

  // Cursor position
  CursorPosition cursor = 4;

  // Scrollback information
  optional ScrollbackInfo scrollback = 5;

  // Compression metadata (optional)
  optional CompressionMetadata compression = 6;
}

// TerminalLine represents a single line in the terminal buffer
message TerminalLine {
  // Line content with ANSI escape sequences preserved
  bytes content = 1;

  // Line attributes for optimization
  optional LineAttributes attributes = 2;
}

// LineAttributes provide metadata for compression optimization
message LineAttributes {
  // True if line is empty (optimization)
  bool is_empty = 1;

  // True if line contains only printable ASCII (optimization)
  bool ascii_only = 2;

  // Character encoding hint for compression
  optional string encoding = 3;

  // Pattern hash for dictionary learning
  optional uint64 pattern_hash = 4;
}

// ScrollbackInfo provides context about terminal scrollback
message ScrollbackInfo {
  // Total lines available in scrollback
  uint64 total_lines = 1;

  // First visible line number (0-based)
  uint64 first_visible = 2;

  // Last visible line number (0-based)
  uint64 last_visible = 3;
}

// CompressionMetadata tracks LZMA compression and dictionary learning
message CompressionMetadata {
  // Compression algorithm used
  string algorithm = 1;  // "lzma", "none"

  // Dictionary ID used for this state
  optional string dictionary_id = 2;

  // Uncompressed size in bytes
  uint64 uncompressed_size = 3;

  // Compressed size in bytes
  uint64 compressed_size = 4;

  // Compression ratio (compressed/uncompressed)
  float compression_ratio = 5;

  // Dictionary learning metadata
  optional DictionaryMetadata dictionary = 6;
}

// DictionaryMetadata tracks dynamic dictionary learning progress
message DictionaryMetadata {
  // Dictionary learning level (base/session/user/project)
  string level = 1;

  // Number of patterns learned
  uint64 pattern_count = 2;

  // Dictionary effectiveness score (0.0-1.0)
  float effectiveness = 3;

  // Last update timestamp
  int64 updated_at = 4;

  // Dictionary size in bytes
  uint64 size_bytes = 5;
}

// ============================================================================
// Review Queue Interaction Events
// ============================================================================

// UserInteractionEvent is emitted when user interacts with a session.
// Triggers immediate review queue re-evaluation for responsive feedback.
message UserInteractionEvent {
  // Session identifier
  string session_id = 1;

  // Type of interaction
  InteractionType type = 2;

  // Optional context about the interaction
  string context = 3;

  // Interaction types
  enum InteractionType {
    INTERACTION_TYPE_UNSPECIFIED = 0;
    // User typed input in terminal
    INTERACTION_TYPE_TERMINAL_INPUT = 1;
    // User approved a prompt
    INTERACTION_TYPE_APPROVAL_GIVEN = 2;
    // User denied/rejected a prompt
    INTERACTION_TYPE_APPROVAL_DENIED = 3;
    // User executed a command
    INTERACTION_TYPE_COMMAND_EXECUTED = 4;
    // User attached to session
    INTERACTION_TYPE_SESSION_ATTACHED = 5;
    // User detached from session
    INTERACTION_TYPE_SESSION_DETACHED = 6;
    // User opened notification panel
    INTERACTION_TYPE_NOTIFICATION_PANEL_OPENED = 7;
    // User closed notification panel
    INTERACTION_TYPE_NOTIFICATION_PANEL_CLOSED = 8;
    // User viewed a notification
    INTERACTION_TYPE_NOTIFICATION_VIEWED = 9;
    // User dismissed a notification
    INTERACTION_TYPE_NOTIFICATION_DISMISSED = 10;
    // User marked notification as read
    INTERACTION_TYPE_NOTIFICATION_MARKED_READ = 11;
    // User marked all notifications as read
    INTERACTION_TYPE_NOTIFICATION_MARKED_ALL_READ = 12;
    // User removed notification from history
    INTERACTION_TYPE_NOTIFICATION_REMOVED = 13;
    // User cleared notification history
    INTERACTION_TYPE_NOTIFICATION_HISTORY_CLEARED = 14;
    // User clicked notification to view session
    INTERACTION_TYPE_NOTIFICATION_SESSION_VIEWED = 15;
  }
}

// SessionAcknowledgedEvent is emitted when user acknowledges/skips a session.
// Session is immediately removed from review queue until next update.
message SessionAcknowledgedEvent {
  // Session identifier
  string session_id = 1;

  // When the acknowledgment occurred
  google.protobuf.Timestamp acknowledged_at = 2;

  // Optional reason for acknowledgment
  string reason = 3;
}

// ApprovalResponseEvent is emitted when user responds to approval dialog.
// Session status is updated and review queue item is removed.
message ApprovalResponseEvent {
  // Session identifier
  string session_id = 1;

  // Whether user approved (true) or denied (false)
  bool approved = 2;

  // What was being approved
  string context = 3;

  // When the response occurred
  google.protobuf.Timestamp responded_at = 4;
}

// ============================================================================
// Review Queue Events (for WatchReviewQueue streaming)
// ============================================================================

// ReviewQueueEvent represents changes to the review queue.
// Used for WatchReviewQueue streaming RPC.
message ReviewQueueEvent {
  // Timestamp when the event occurred
  google.protobuf.Timestamp timestamp = 1;

  // Event type
  oneof event {
    ReviewQueueItemAddedEvent item_added = 2;
    ReviewQueueItemRemovedEvent item_removed = 3;
    ReviewQueueItemUpdatedEvent item_updated = 4;
    ReviewQueueStatisticsEvent statistics = 5;
  }
}

// ReviewQueueItemAddedEvent is emitted when item is added to queue
message ReviewQueueItemAddedEvent {
  // The item that was added
  ReviewItem item = 1;

  // What triggered this addition
  string trigger = 2; // "poller", "manual_check", "status_change"
}

// ReviewQueueItemRemovedEvent is emitted when item is removed from queue
message ReviewQueueItemRemovedEvent {
  // Session ID of removed item
  string session_id = 1;

  // Why it was removed
  string reason = 2; // "resolved", "dismissed", "timeout", "acknowledged"
}

// ReviewQueueItemUpdatedEvent is emitted when item properties change
message ReviewQueueItemUpdatedEvent {
  // Session ID
  string session_id = 1;

  // Updated item
  ReviewItem item = 2;

  // What changed
  repeated string updated_fields = 3; // "priority", "context", "reason"
}

// ReviewQueueStatisticsEvent provides aggregate queue statistics
message ReviewQueueStatisticsEvent {
  // Total items in queue
  int32 total_items = 1;

  // Items by priority level
  map<int32, int32> by_priority = 2;

  // Items by attention reason
  map<int32, int32> by_reason = 3;

  // Average age in milliseconds
  int64 average_age_ms = 4;

  // Sessions that auto-escalated since last statistics
  repeated string escalated_items = 5;
}

// ============================================================================
// Notification Events (for cross-process notification broadcasting)
// ============================================================================

// NotificationEvent is emitted when a tmux session sends a notification.
// Broadcast to all connected clients (web UI and TUI) for display.
message NotificationEvent {
  // Session that sent the notification
  string session_id = 1;

  // Session name for display
  string session_name = 2;

  // Type of notification (determines default UI treatment)
  NotificationType notification_type = 3;

  // Priority level (determines audio, visual styling, auto-dismiss)
  NotificationPriority priority = 4;

  // Human-readable title
  string title = 5;

  // Detailed message
  string message = 6;

  // Optional metadata (key-value pairs for additional context)
  map<string, string> metadata = 7;

  // When the notification was sent (from server)
  google.protobuf.Timestamp timestamp = 8;

  // Unique notification ID (for tracking)
  string notification_id = 9;
}
