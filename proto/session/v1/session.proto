syntax = "proto3";

package session.v1;

import "google/protobuf/timestamp.proto";
import "session/v1/types.proto";
import "session/v1/events.proto";

// SessionService manages AI agent session lifecycle operations.
// Provides CRUD operations and real-time streaming for session management.
service SessionService {
  // ListSessions returns all sessions with optional filtering.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {}

  // GetSession retrieves a specific session by ID.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {}

  // CreateSession initializes a new AI agent session with tmux and git worktree.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse) {}

  // UpdateSession modifies session properties (pause/resume, category, etc).
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse) {}

  // DeleteSession stops and removes a session, cleaning up resources.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse) {}

  // WatchSessions streams real-time session events (created/updated/deleted).
  // Server-streaming RPC for live updates without polling.
  rpc WatchSessions(WatchSessionsRequest) returns (stream SessionEvent) {}

  // StreamTerminal provides bidirectional streaming for terminal I/O.
  // Clients can send input and receive output from the tmux PTY.
  rpc StreamTerminal(stream TerminalData) returns (stream TerminalData) {}

  // GetSessionDiff retrieves the current git diff for a session.
  rpc GetSessionDiff(GetSessionDiffRequest) returns (GetSessionDiffResponse) {}

  // GetVCSStatus retrieves the current version control status for a session.
  // Returns branch info, changed files, staged/unstaged status, and remote sync state.
  rpc GetVCSStatus(GetVCSStatusRequest) returns (GetVCSStatusResponse) {}

  // GetReviewQueue returns sessions needing user attention with priority ordering.
  rpc GetReviewQueue(GetReviewQueueRequest) returns (GetReviewQueueResponse) {}

  // AcknowledgeSession marks a session as acknowledged in the review queue.
  // The session won't reappear in the queue until it receives an update.
  rpc AcknowledgeSession(AcknowledgeSessionRequest) returns (AcknowledgeSessionResponse) {}

  // GetLogs retrieves application logs with optional filtering and search.
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse) {}

  // WatchReviewQueue streams real-time review queue events (items added/removed/updated).
  // Server-streaming RPC for live queue updates without polling.
  rpc WatchReviewQueue(WatchReviewQueueRequest) returns (stream ReviewQueueEvent) {}

  // LogUserInteraction logs a user interaction event for audit trail.
  // Records user actions for compliance, debugging, and analytics.
  rpc LogUserInteraction(LogUserInteractionRequest) returns (LogUserInteractionResponse) {}

  // GetClaudeConfig retrieves a Claude configuration file by name (CLAUDE.md, settings.json, agents.md).
  rpc GetClaudeConfig(GetClaudeConfigRequest) returns (GetClaudeConfigResponse) {}

  // ListClaudeConfigs returns all configuration files in the ~/.claude directory.
  rpc ListClaudeConfigs(ListClaudeConfigsRequest) returns (ListClaudeConfigsResponse) {}

  // UpdateClaudeConfig updates a Claude configuration file with atomic write and backup.
  rpc UpdateClaudeConfig(UpdateClaudeConfigRequest) returns (UpdateClaudeConfigResponse) {}

  // ListClaudeHistory returns Claude session history entries with optional filtering.
  rpc ListClaudeHistory(ListClaudeHistoryRequest) returns (ListClaudeHistoryResponse) {}

  // GetClaudeHistoryDetail retrieves detailed information for a specific history entry.
  rpc GetClaudeHistoryDetail(GetClaudeHistoryDetailRequest) returns (GetClaudeHistoryDetailResponse) {}

  // GetClaudeHistoryMessages retrieves messages from a specific conversation.
  rpc GetClaudeHistoryMessages(GetClaudeHistoryMessagesRequest) returns (GetClaudeHistoryMessagesResponse) {}

  // SearchClaudeHistory performs full-text search across Claude conversation history.
  // Returns ranked results with contextual snippets showing where query terms appear.
  rpc SearchClaudeHistory(SearchClaudeHistoryRequest) returns (SearchClaudeHistoryResponse) {}

  // GetPRInfo retrieves the latest PR information for a session.
  rpc GetPRInfo(GetPRInfoRequest) returns (GetPRInfoResponse) {}

  // GetPRComments retrieves all comments on the PR for a session.
  rpc GetPRComments(GetPRCommentsRequest) returns (GetPRCommentsResponse) {}

  // PostPRComment posts a new comment to the PR for a session.
  rpc PostPRComment(PostPRCommentRequest) returns (PostPRCommentResponse) {}

  // MergePR merges the PR for a session using the specified merge method.
  rpc MergePR(MergePRRequest) returns (MergePRResponse) {}

  // ClosePR closes the PR without merging for a session.
  rpc ClosePR(ClosePRRequest) returns (ClosePRResponse) {}

  // SendNotification allows tmux sessions to send notifications to the server.
  // Notifications are broadcast to all connected clients (web UI and TUI).
  // Requires session_id to identify the source session.
  // Enforces localhost-only restriction and rate limiting (10/sec per session).
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse) {}

  // FocusWindow activates a window for the specified application.
  // Used for deep linking from notifications to bring the source IDE/terminal to front.
  // Only works on macOS via AppleScript. Requires localhost origin.
  rpc FocusWindow(FocusWindowRequest) returns (FocusWindowResponse) {}

  // RenameSession changes the title of an existing session.
  // Validates that the new title doesn't conflict with existing sessions.
  rpc RenameSession(RenameSessionRequest) returns (RenameSessionResponse) {}

  // RestartSession restarts a session by killing and recreating the tmux session.
  // Optionally preserves terminal output for debugging purposes.
  rpc RestartSession(RestartSessionRequest) returns (RestartSessionResponse) {}

  // GetWorkspaceInfo retrieves VCS and workspace information for a session.
  // Returns VCS type (Git/JJ), current branch, revision, and uncommitted changes status.
  rpc GetWorkspaceInfo(GetWorkspaceInfoRequest) returns (GetWorkspaceInfoResponse) {}

  // ListWorkspaceTargets returns available switch targets for a session.
  // Includes bookmarks/branches, recent revisions, and worktrees.
  rpc ListWorkspaceTargets(ListWorkspaceTargetsRequest) returns (ListWorkspaceTargetsResponse) {}

  // SwitchWorkspace switches a session's workspace to a different branch, revision, or worktree.
  // The session is restarted with Claude --resume to preserve conversation context.
  rpc SwitchWorkspace(SwitchWorkspaceRequest) returns (SwitchWorkspaceResponse) {}

  // ResolveApproval allows the web UI to approve or deny a pending Claude Code tool use request.
  // This unblocks the HTTP hook handler that is waiting for the user's decision.
  rpc ResolveApproval(ResolveApprovalRequest) returns (ResolveApprovalResponse) {}

  // ListPendingApprovals returns all pending Claude Code tool approval requests.
  // Used by the web UI to populate the approval panel on initial load.
  rpc ListPendingApprovals(ListPendingApprovalsRequest) returns (ListPendingApprovalsResponse) {}

  // CreateDebugSnapshot captures diagnostic information and writes it to a JSON file.
  // Gathers session state, tmux info, pending approvals, and recent logs.
  // The file is written to ~/.claude-squad/logs/debug-snapshot-{timestamp}.json.
  rpc CreateDebugSnapshot(CreateDebugSnapshotRequest) returns (CreateDebugSnapshotResponse) {}

  // GetNotificationHistory returns persisted notification history with optional filtering.
  // Notifications survive server restarts and page refreshes.
  rpc GetNotificationHistory(GetNotificationHistoryRequest) returns (GetNotificationHistoryResponse) {}

  // MarkNotificationRead marks specific notifications as read.
  // If notification_ids is empty, marks all notifications as read.
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse) {}

  // ClearNotificationHistory removes notifications from the history.
  // Optionally filters by timestamp to only clear older notifications.
  rpc ClearNotificationHistory(ClearNotificationHistoryRequest) returns (ClearNotificationHistoryResponse) {}
}

// ListSessionsRequest allows filtering sessions by various criteria.
message ListSessionsRequest {
  // Filter by session status (e.g., RUNNING, PAUSED).
  optional SessionStatus status = 1;

  // Filter by category name.
  optional string category = 2;

  // Hide paused sessions from results.
  bool hide_paused = 3;

  // Search query for fuzzy matching across title, path, branch.
  optional string search_query = 4;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message GetSessionRequest {
  // Session identifier (uses session title as ID).
  string id = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message CreateSessionRequest {
  // Required: Human-readable session title.
  string title = 1;

  // Required: Path to workspace repository root.
  string path = 2;

  // Optional: Directory within repository to start in.
  string working_dir = 3;

  // Optional: Git branch name (creates new branch if doesn't exist).
  string branch = 4;

  // Optional: Program to run (default: "claude").
  string program = 5;

  // Optional: Category for organization.
  string category = 6;

  // Optional: Initial prompt to pass on startup.
  string prompt = 7;

  // Optional: Auto-approve prompts without user interaction.
  bool auto_yes = 8;

  // Optional: Reuse existing worktree at this path.
  string existing_worktree = 9;

  // Optional: Resume an existing Claude conversation by ID.
  // This ID comes from ClaudeHistoryEntry.id and will use Claude's --resume flag.
  string resume_id = 10;
}

message CreateSessionResponse {
  Session session = 1;
}

message UpdateSessionRequest {
  // Session identifier.
  string id = 1;

  // Update session status (pause/resume).
  optional SessionStatus status = 2;

  // Update category.
  optional string category = 3;

  // Update title.
  optional string title = 4;

  // Update program command.
  optional string program = 5;
}

message UpdateSessionResponse {
  Session session = 1;
}

message DeleteSessionRequest {
  // Session identifier.
  string id = 1;

  // Force deletion even if session is running.
  bool force = 2;
}

message DeleteSessionResponse {
  // Whether deletion was successful.
  bool success = 1;

  // Human-readable message.
  string message = 2;
}

message WatchSessionsRequest {
  // Optional: Only watch sessions matching this category.
  optional string category_filter = 1;

  // Optional: Only watch sessions with this status.
  optional SessionStatus status_filter = 2;
}

message GetSessionDiffRequest {
  // Session identifier.
  string id = 1;
}

message GetSessionDiffResponse {
  // Git diff statistics.
  DiffStats diff_stats = 1;
}

message GetVCSStatusRequest {
  // Session identifier.
  string id = 1;
}

message GetVCSStatusResponse {
  // VCS status for the session's working directory.
  VCSStatus vcs_status = 1;

  // Error message if VCS status couldn't be retrieved.
  string error = 2;
}

message GetReviewQueueRequest {
  // Optional: Filter by priority level.
  optional Priority priority_filter = 1;

  // Optional: Filter by attention reason.
  optional AttentionReason reason_filter = 2;
}

message GetReviewQueueResponse {
  // Review queue with all items and statistics.
  ReviewQueue review_queue = 1;
}

message AcknowledgeSessionRequest {
  // Session identifier to acknowledge.
  string id = 1;
}

message AcknowledgeSessionResponse {
  // Whether acknowledgment was successful.
  bool success = 1;

  // Human-readable message.
  string message = 2;
}

message GetLogsRequest {
  // Optional: Search query to filter log entries by content.
  optional string search_query = 1;

  // Optional: Filter by log level (DEBUG, INFO, WARNING, ERROR).
  optional string level = 2;

  // Optional: Start time for log range (RFC3339 format).
  optional google.protobuf.Timestamp start_time = 3;

  // Optional: End time for log range (RFC3339 format).
  optional google.protobuf.Timestamp end_time = 4;

  // Optional: Maximum number of log entries to return (default: 100).
  optional int32 limit = 5;

  // Optional: Number of entries to skip for pagination (default: 0).
  optional int32 offset = 6;
}

message GetLogsResponse {
  // Log entries matching the filter criteria.
  repeated LogEntry entries = 1;

  // Total number of log entries matching the filter (before limit/offset).
  int32 total_count = 2;

  // Whether there are more logs available to fetch.
  bool has_more = 3;
}

message LogEntry {
  // Timestamp of the log entry.
  google.protobuf.Timestamp timestamp = 1;

  // Log level (DEBUG, INFO, WARNING, ERROR).
  string level = 2;

  // Log message content.
  string message = 3;

  // Source file and line number (e.g., "app.go:123").
  optional string source = 4;
}

message WatchReviewQueueRequest {
  // Optional: Filter by priority level (only receive events for these priorities).
  repeated Priority priority_filter = 1;

  // Optional: Filter by attention reason.
  repeated AttentionReason reason_filter = 2;

  // Include statistics events (aggregate queue stats).
  bool include_statistics = 3;

  // Send initial snapshot of current queue state.
  bool initial_snapshot = 4;

  // Optional: Only events for specific sessions.
  repeated string session_ids = 5;
}

message LogUserInteractionRequest {
  // Session identifier (optional - may be empty for panel-level actions).
  optional string session_id = 1;

  // Type of interaction (from UserInteractionEvent.InteractionType enum).
  UserInteractionEvent.InteractionType interaction_type = 2;

  // Additional context about the interaction.
  optional string context = 3;

  // Optional: Notification ID if this interaction involves a notification.
  optional string notification_id = 4;

  // Optional: Additional metadata as key-value pairs.
  map<string, string> metadata = 5;
}

message LogUserInteractionResponse {
  // Whether the log was successfully recorded.
  bool success = 1;

  // Optional: Error message if logging failed.
  optional string error = 2;
}



// Claude Config Management Messages

message GetClaudeConfigRequest {
  // Filename to retrieve (e.g., "CLAUDE.md", "settings.json", "agents.md")
  string filename = 1;
}

message GetClaudeConfigResponse {
  // Configuration file data
  ClaudeConfigFile config = 1;
}

message ListClaudeConfigsRequest {
  // Empty request - returns all config files
}

message ListClaudeConfigsResponse {
  // List of all configuration files
  repeated ClaudeConfigFile configs = 1;
}

message UpdateClaudeConfigRequest {
  // Filename to update
  string filename = 1;
  // New file content
  string content = 2;
  // If true, validate JSON content before writing (for .json files)
  bool validate = 3;
}

message UpdateClaudeConfigResponse {
  // Updated configuration file data
  ClaudeConfigFile config = 1;
}

message ClaudeConfigFile {
  // Filename (e.g., "CLAUDE.md", "settings.json")
  string name = 1;
  // Absolute path to the file
  string path = 2;
  // File content
  string content = 3;
  // Last modification timestamp
  google.protobuf.Timestamp mod_time = 4;
}

// Claude Session History Messages

message ListClaudeHistoryRequest {
  // Optional project path filter
  optional string project = 1;
  // Optional search query (searches name and project)
  optional string search_query = 2;
  // Maximum number of results to return (0 = all)
  int32 limit = 3;
}

message ListClaudeHistoryResponse {
  // List of history entries
  repeated ClaudeHistoryEntry entries = 1;
  // Total count of entries (before limit applied)
  int32 total_count = 2;
}

message GetClaudeHistoryDetailRequest {
  // History entry ID
  string id = 1;
}

message GetClaudeHistoryDetailResponse {
  // Detailed history entry
  ClaudeHistoryEntry entry = 1;
}

message ClaudeHistoryEntry {
  // Unique conversation identifier
  string id = 1;
  // Conversation title/name
  string name = 2;
  // Project/directory path
  string project = 3;
  // Conversation creation timestamp
  google.protobuf.Timestamp created_at = 4;
  // Last update timestamp
  google.protobuf.Timestamp updated_at = 5;
  // Claude model used (e.g., "claude-sonnet-4")
  string model = 6;
  // Number of messages in the conversation
  int32 message_count = 7;
}

message GetClaudeHistoryMessagesRequest {
  // History entry ID (session ID)
  string id = 1;
  // Optional limit on number of messages to return
  int32 limit = 2;
  // Optional offset for pagination
  int32 offset = 3;
}

message GetClaudeHistoryMessagesResponse {
  // Messages from the conversation
  repeated ClaudeMessage messages = 1;
  // Total number of messages in the conversation
  int32 total_count = 2;
}

message ClaudeMessage {
  // Message role (user or assistant)
  string role = 1;
  // Message content (text or JSON string)
  string content = 2;
  // Message timestamp
  google.protobuf.Timestamp timestamp = 3;
  // Model used (for assistant messages)
  string model = 4;
}

// Full-Text Search Messages

message SearchClaudeHistoryRequest {
  // Search query (required). Supports natural language queries.
  string query = 1;
  // Optional project path filter.
  optional string project = 2;
  // Optional model filter (e.g., "claude-sonnet-4").
  optional string model = 3;
  // Optional start of date range filter.
  optional google.protobuf.Timestamp start_time = 4;
  // Optional end of date range filter.
  optional google.protobuf.Timestamp end_time = 5;
  // Maximum number of results to return (default: 20, max: 100).
  int32 limit = 6;
  // Number of results to skip for pagination (default: 0).
  int32 offset = 7;
}

message SearchClaudeHistoryResponse {
  // List of search results, ranked by relevance.
  repeated SearchResult results = 1;
  // Total number of matching documents (before pagination).
  int32 total_matches = 2;
  // Query execution time in milliseconds.
  int64 query_time_ms = 3;
  // Indicates if there are more results available.
  bool has_more = 4;
}

message SearchResult {
  // The conversation/session ID containing this match.
  string session_id = 1;
  // Conversation name/title.
  string session_name = 2;
  // Project/directory path.
  string project = 3;
  // Index of the matched message within the conversation.
  int32 message_index = 4;
  // BM25 relevance score (higher is more relevant).
  float score = 5;
  // Contextual snippets showing where the query terms appear.
  repeated SearchSnippet snippets = 6;
  // Metadata about the match source.
  SearchResultMetadata metadata = 7;
}

message SearchSnippet {
  // Snippet text with surrounding context.
  string text = 1;
  // Ranges within text that should be highlighted.
  repeated HighlightRange highlight_ranges = 2;
  // Role of the message (user, assistant, system).
  string message_role = 3;
  // When the message was created.
  google.protobuf.Timestamp message_time = 4;
}

message HighlightRange {
  // Start position in text (character offset).
  int32 start = 1;
  // End position in text (character offset).
  int32 end = 2;
}

message SearchResultMetadata {
  // True if match is in session name/project (vs message content).
  bool is_metadata_match = 1;
  // Source of the match: "session_name", "project", "message_content".
  string match_source = 2;
  // Claude model used in this conversation.
  string model = 3;
  // Conversation creation timestamp.
  google.protobuf.Timestamp created_at = 4;
}

// PR Tracking Messages

message GetPRInfoRequest {
  // Session identifier (must be a PR session)
  string id = 1;
}

message GetPRInfoResponse {
  // PR metadata
  PRInfo pr_info = 1;
}

message GetPRCommentsRequest {
  // Session identifier (must be a PR session)
  string id = 1;
}

message GetPRCommentsResponse {
  // List of PR comments
  repeated PRComment comments = 1;
}

message PostPRCommentRequest {
  // Session identifier (must be a PR session)
  string id = 1;
  // Comment body (required)
  string body = 2;
}

message PostPRCommentResponse {
  // Whether the comment was successfully posted
  bool success = 1;
  // Human-readable message
  string message = 2;
}

message MergePRRequest {
  // Session identifier (must be a PR session)
  string id = 1;
  // Merge method: "merge", "squash", or "rebase" (default: "merge")
  optional string method = 2;
}

message MergePRResponse {
  // Whether the PR was successfully merged
  bool success = 1;
  // Human-readable message
  string message = 2;
}

message ClosePRRequest {
  // Session identifier (must be a PR session)
  string id = 1;
}

message ClosePRResponse {
  // Whether the PR was successfully closed
  bool success = 1;
  // Human-readable message
  string message = 2;
}

// SendNotificationRequest allows tmux sessions to send notifications.
message SendNotificationRequest {
  // Session identifier sending the notification (required)
  string session_id = 1;

  // Type of notification (determines default priority and UI treatment)
  NotificationType notification_type = 2;

  // Priority level (optional, overrides default for notification type)
  NotificationPriority priority = 3;

  // Human-readable title (required)
  string title = 4;

  // Detailed message (optional)
  string message = 5;

  // Optional metadata (key-value pairs for additional context)
  // Common keys: "command", "file", "duration", "error_code"
  map<string, string> metadata = 6;
}

// SendNotificationResponse confirms notification was received.
message SendNotificationResponse {
  // Whether notification was accepted and broadcast
  bool success = 1;

  // Human-readable response message
  string message = 2;

  // Notification ID (for tracking/debugging)
  string notification_id = 3;
}

// FocusWindowRequest specifies which application window to bring to front.
message FocusWindowRequest {
  // macOS bundle identifier (e.g., "com.jetbrains.intellij", "com.microsoft.VSCode")
  // This is the preferred method for window activation.
  optional string bundle_id = 1;

  // Application name (e.g., "IntelliJ IDEA", "Visual Studio Code")
  // Used as fallback if bundle_id is not provided.
  optional string app_name = 2;

  // Process ID (optional, for more specific targeting)
  optional int32 pid = 3;

  // Project name/path (for IDEs that support project-specific activation)
  optional string project = 4;
}

// FocusWindowResponse indicates whether window activation succeeded.
message FocusWindowResponse {
  // Whether the window was successfully activated
  bool success = 1;

  // Human-readable message (error details if failed)
  string message = 2;

  // Platform (e.g., "darwin", "linux", "windows")
  string platform = 3;
}

// RenameSessionRequest changes the title of an existing session.
message RenameSessionRequest {
  // Session identifier (uses session title as ID).
  string id = 1;

  // New title for the session (must be unique).
  string new_title = 2;
}

// RenameSessionResponse returns the updated session.
message RenameSessionResponse {
  // Updated session with new title.
  Session session = 1;
}

// RestartSessionRequest restarts a session.
message RestartSessionRequest {
  // Session identifier (uses session title as ID).
  string id = 1;

  // Optional: preserve terminal output before restart (default: false).
  bool preserve_output = 2;
}

// RestartSessionResponse indicates restart success.
message RestartSessionResponse {
  // Restarted session.
  Session session = 1;

  // Whether the restart was successful.
  bool success = 2;

  // Human-readable message (error details if failed).
  string message = 3;
}

// GetWorkspaceInfoRequest retrieves VCS information for a session.
message GetWorkspaceInfoRequest {
  // Session identifier.
  string id = 1;
}

// GetWorkspaceInfoResponse returns VCS and workspace information.
message GetWorkspaceInfoResponse {
  // VCS and workspace information.
  VCSInfo vcs_info = 1;

  // Error message if VCS info couldn't be retrieved.
  string error = 2;
}

// ListWorkspaceTargetsRequest retrieves available switch targets for a session.
message ListWorkspaceTargetsRequest {
  // Session identifier.
  string id = 1;
}

// ListWorkspaceTargetsResponse returns available workspace switch targets.
message ListWorkspaceTargetsResponse {
  // Available switch targets.
  AvailableWorkspaceTargets targets = 1;

  // Error message if targets couldn't be retrieved.
  string error = 2;
}

// SwitchWorkspaceRequest initiates a workspace switch for a session.
message SwitchWorkspaceRequest {
  // Session identifier.
  string id = 1;

  // Type of switch operation.
  WorkspaceSwitchType switch_type = 2;

  // Target destination (branch name, revision ID, worktree path, or directory path).
  string target = 3;

  // Strategy for handling uncommitted changes.
  ChangeStrategy change_strategy = 4;

  // Create the bookmark/branch/worktree if it doesn't exist.
  bool create_if_missing = 5;

  // Base revision for new bookmark creation (empty = current).
  string base_revision = 6;
}

// ResolveApprovalRequest approves or denies a pending tool use request.
message ResolveApprovalRequest {
  // Unique approval ID (from notification metadata.approval_id).
  string approval_id = 1;

  // User's decision: "allow" or "deny".
  string decision = 2;

  // Optional reason shown to Claude when denying.
  optional string message = 3;
}

// ResolveApprovalResponse confirms the decision was received.
message ResolveApprovalResponse {
  bool success = 1;
  string message = 2;
}

// ListPendingApprovalsRequest filters pending approvals.
message ListPendingApprovalsRequest {
  // Optional: only return approvals for this session.
  optional string session_id = 1;
}

// ListPendingApprovalsResponse returns pending approvals.
message ListPendingApprovalsResponse {
  repeated PendingApprovalProto approvals = 1;
}

// SwitchWorkspaceResponse returns the result of a workspace switch operation.
message SwitchWorkspaceResponse {
  // Whether the switch was successful.
  bool success = 1;

  // Human-readable message (error details if failed).
  string message = 2;

  // Revision before the switch.
  string previous_revision = 3;

  // Revision after the switch.
  string current_revision = 4;

  // VCS type that was used.
  VCSType vcs_type = 5;

  // Description of how uncommitted changes were handled.
  string changes_handled = 6;

  // Updated session after the switch.
  Session session = 7;
}

// CreateDebugSnapshotRequest triggers a server-side diagnostic snapshot.
message CreateDebugSnapshotRequest {
  // Optional user note describing the issue being diagnosed.
  optional string note = 1;

  // Optional: Maximum number of recent log lines to include (default: 200).
  optional int32 log_lines = 2;
}

// CreateDebugSnapshotResponse returns the path and summary of the written snapshot.
message CreateDebugSnapshotResponse {
  // Absolute path to the written snapshot JSON file.
  string file_path = 1;

  // Human-readable summary (e.g., "Captured 5 sessions, 2 pending approvals, 200 log lines").
  string summary = 2;

  // Timestamp when the snapshot was created (RFC3339).
  string timestamp = 3;

  // Size of the snapshot file in bytes.
  int64 file_size_bytes = 4;
}

// ============================================================================
// Notification History Messages
// ============================================================================

// NotificationHistoryRecord represents a persisted notification.
message NotificationHistoryRecord {
  string id = 1;
  string session_id = 2;
  string session_name = 3;
  NotificationType notification_type = 4;
  NotificationPriority priority = 5;
  string title = 6;
  string message = 7;
  map<string, string> metadata = 8;
  google.protobuf.Timestamp created_at = 9;
  bool is_read = 10;
  optional google.protobuf.Timestamp read_at = 11;
}

// GetNotificationHistoryRequest filters and paginates notification history.
message GetNotificationHistoryRequest {
  optional int32 limit = 1;
  optional int32 offset = 2;
  optional NotificationType type_filter = 3;
  optional string session_id = 4;
  optional bool unread_only = 5;
}

// GetNotificationHistoryResponse contains notification history results.
message GetNotificationHistoryResponse {
  repeated NotificationHistoryRecord notifications = 1;
  int32 total_count = 2;
  int32 unread_count = 3;
  bool has_more = 4;
}

// MarkNotificationReadRequest marks notifications as read.
// If notification_ids is empty, all notifications are marked as read.
message MarkNotificationReadRequest {
  repeated string notification_ids = 1;
}

// MarkNotificationReadResponse confirms how many notifications were marked.
message MarkNotificationReadResponse {
  bool success = 1;
  int32 marked_count = 2;
}

// ClearNotificationHistoryRequest removes notifications from history.
message ClearNotificationHistoryRequest {
  // Optional: Clear notifications older than this timestamp (RFC3339 string).
  optional string before_timestamp = 1;
}

// ClearNotificationHistoryResponse confirms how many notifications were cleared.
message ClearNotificationHistoryResponse {
  bool success = 1;
  int32 cleared_count = 2;
}
