syntax = "proto3";

package session.v1;

import "google/protobuf/timestamp.proto";
import "session/v1/types.proto";
import "session/v1/events.proto";

// SessionService manages AI agent session lifecycle operations.
// Provides CRUD operations and real-time streaming for session management.
service SessionService {
  // ListSessions returns all sessions with optional filtering.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {}

  // GetSession retrieves a specific session by ID.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {}

  // CreateSession initializes a new AI agent session with tmux and git worktree.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse) {}

  // UpdateSession modifies session properties (pause/resume, category, etc).
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse) {}

  // DeleteSession stops and removes a session, cleaning up resources.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse) {}

  // WatchSessions streams real-time session events (created/updated/deleted).
  // Server-streaming RPC for live updates without polling.
  rpc WatchSessions(WatchSessionsRequest) returns (stream SessionEvent) {}

  // StreamTerminal provides bidirectional streaming for terminal I/O.
  // Clients can send input and receive output from the tmux PTY.
  rpc StreamTerminal(stream TerminalData) returns (stream TerminalData) {}

  // GetSessionDiff retrieves the current git diff for a session.
  rpc GetSessionDiff(GetSessionDiffRequest) returns (GetSessionDiffResponse) {}

  // GetReviewQueue returns sessions needing user attention with priority ordering.
  rpc GetReviewQueue(GetReviewQueueRequest) returns (GetReviewQueueResponse) {}

  // AcknowledgeSession marks a session as acknowledged in the review queue.
  // The session won't reappear in the queue until it receives an update.
  rpc AcknowledgeSession(AcknowledgeSessionRequest) returns (AcknowledgeSessionResponse) {}

  // GetLogs retrieves application logs with optional filtering and search.
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse) {}

  // WatchReviewQueue streams real-time review queue events (items added/removed/updated).
  // Server-streaming RPC for live queue updates without polling.
  rpc WatchReviewQueue(WatchReviewQueueRequest) returns (stream ReviewQueueEvent) {}

  // LogUserInteraction logs a user interaction event for audit trail.
  // Records user actions for compliance, debugging, and analytics.
  rpc LogUserInteraction(LogUserInteractionRequest) returns (LogUserInteractionResponse) {}

  // GetClaudeConfig retrieves a Claude configuration file by name (CLAUDE.md, settings.json, agents.md).
  rpc GetClaudeConfig(GetClaudeConfigRequest) returns (GetClaudeConfigResponse) {}

  // ListClaudeConfigs returns all configuration files in the ~/.claude directory.
  rpc ListClaudeConfigs(ListClaudeConfigsRequest) returns (ListClaudeConfigsResponse) {}

  // UpdateClaudeConfig updates a Claude configuration file with atomic write and backup.
  rpc UpdateClaudeConfig(UpdateClaudeConfigRequest) returns (UpdateClaudeConfigResponse) {}

  // ListClaudeHistory returns Claude session history entries with optional filtering.
  rpc ListClaudeHistory(ListClaudeHistoryRequest) returns (ListClaudeHistoryResponse) {}

  // GetClaudeHistoryDetail retrieves detailed information for a specific history entry.
  rpc GetClaudeHistoryDetail(GetClaudeHistoryDetailRequest) returns (GetClaudeHistoryDetailResponse) {}

  // GetClaudeHistoryMessages retrieves messages from a specific conversation.
  rpc GetClaudeHistoryMessages(GetClaudeHistoryMessagesRequest) returns (GetClaudeHistoryMessagesResponse) {}

  // GetPRInfo retrieves the latest PR information for a session.
  rpc GetPRInfo(GetPRInfoRequest) returns (GetPRInfoResponse) {}

  // GetPRComments retrieves all comments on the PR for a session.
  rpc GetPRComments(GetPRCommentsRequest) returns (GetPRCommentsResponse) {}

  // PostPRComment posts a new comment to the PR for a session.
  rpc PostPRComment(PostPRCommentRequest) returns (PostPRCommentResponse) {}

  // MergePR merges the PR for a session using the specified merge method.
  rpc MergePR(MergePRRequest) returns (MergePRResponse) {}

  // ClosePR closes the PR without merging for a session.
  rpc ClosePR(ClosePRRequest) returns (ClosePRResponse) {}

  // SendNotification allows tmux sessions to send notifications to the server.
  // Notifications are broadcast to all connected clients (web UI and TUI).
  // Requires session_id to identify the source session.
  // Enforces localhost-only restriction and rate limiting (10/sec per session).
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse) {}
}

// ListSessionsRequest allows filtering sessions by various criteria.
message ListSessionsRequest {
  // Filter by session status (e.g., RUNNING, PAUSED).
  optional SessionStatus status = 1;

  // Filter by category name.
  optional string category = 2;

  // Hide paused sessions from results.
  bool hide_paused = 3;

  // Search query for fuzzy matching across title, path, branch.
  optional string search_query = 4;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message GetSessionRequest {
  // Session identifier (uses session title as ID).
  string id = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message CreateSessionRequest {
  // Required: Human-readable session title.
  string title = 1;

  // Required: Path to workspace repository root.
  string path = 2;

  // Optional: Directory within repository to start in.
  string working_dir = 3;

  // Optional: Git branch name (creates new branch if doesn't exist).
  string branch = 4;

  // Optional: Program to run (default: "claude").
  string program = 5;

  // Optional: Category for organization.
  string category = 6;

  // Optional: Initial prompt to pass on startup.
  string prompt = 7;

  // Optional: Auto-approve prompts without user interaction.
  bool auto_yes = 8;

  // Optional: Reuse existing worktree at this path.
  string existing_worktree = 9;
}

message CreateSessionResponse {
  Session session = 1;
}

message UpdateSessionRequest {
  // Session identifier.
  string id = 1;

  // Update session status (pause/resume).
  optional SessionStatus status = 2;

  // Update category.
  optional string category = 3;

  // Update title.
  optional string title = 4;
}

message UpdateSessionResponse {
  Session session = 1;
}

message DeleteSessionRequest {
  // Session identifier.
  string id = 1;

  // Force deletion even if session is running.
  bool force = 2;
}

message DeleteSessionResponse {
  // Whether deletion was successful.
  bool success = 1;

  // Human-readable message.
  string message = 2;
}

message WatchSessionsRequest {
  // Optional: Only watch sessions matching this category.
  optional string category_filter = 1;

  // Optional: Only watch sessions with this status.
  optional SessionStatus status_filter = 2;
}

message GetSessionDiffRequest {
  // Session identifier.
  string id = 1;
}

message GetSessionDiffResponse {
  // Git diff statistics.
  DiffStats diff_stats = 1;
}

message GetReviewQueueRequest {
  // Optional: Filter by priority level.
  optional Priority priority_filter = 1;

  // Optional: Filter by attention reason.
  optional AttentionReason reason_filter = 2;
}

message GetReviewQueueResponse {
  // Review queue with all items and statistics.
  ReviewQueue review_queue = 1;
}

message AcknowledgeSessionRequest {
  // Session identifier to acknowledge.
  string id = 1;
}

message AcknowledgeSessionResponse {
  // Whether acknowledgment was successful.
  bool success = 1;

  // Human-readable message.
  string message = 2;
}

message GetLogsRequest {
  // Optional: Search query to filter log entries by content.
  optional string search_query = 1;

  // Optional: Filter by log level (DEBUG, INFO, WARNING, ERROR).
  optional string level = 2;

  // Optional: Start time for log range (RFC3339 format).
  optional google.protobuf.Timestamp start_time = 3;

  // Optional: End time for log range (RFC3339 format).
  optional google.protobuf.Timestamp end_time = 4;

  // Optional: Maximum number of log entries to return (default: 100).
  optional int32 limit = 5;

  // Optional: Number of entries to skip for pagination (default: 0).
  optional int32 offset = 6;
}

message GetLogsResponse {
  // Log entries matching the filter criteria.
  repeated LogEntry entries = 1;

  // Total number of log entries matching the filter (before limit/offset).
  int32 total_count = 2;

  // Whether there are more logs available to fetch.
  bool has_more = 3;
}

message LogEntry {
  // Timestamp of the log entry.
  google.protobuf.Timestamp timestamp = 1;

  // Log level (DEBUG, INFO, WARNING, ERROR).
  string level = 2;

  // Log message content.
  string message = 3;

  // Source file and line number (e.g., "app.go:123").
  optional string source = 4;
}

message WatchReviewQueueRequest {
  // Optional: Filter by priority level (only receive events for these priorities).
  repeated Priority priority_filter = 1;

  // Optional: Filter by attention reason.
  repeated AttentionReason reason_filter = 2;

  // Include statistics events (aggregate queue stats).
  bool include_statistics = 3;

  // Send initial snapshot of current queue state.
  bool initial_snapshot = 4;

  // Optional: Only events for specific sessions.
  repeated string session_ids = 5;
}

message LogUserInteractionRequest {
  // Session identifier (optional - may be empty for panel-level actions).
  optional string session_id = 1;

  // Type of interaction (from UserInteractionEvent.InteractionType enum).
  UserInteractionEvent.InteractionType interaction_type = 2;

  // Additional context about the interaction.
  optional string context = 3;

  // Optional: Notification ID if this interaction involves a notification.
  optional string notification_id = 4;

  // Optional: Additional metadata as key-value pairs.
  map<string, string> metadata = 5;
}

message LogUserInteractionResponse {
  // Whether the log was successfully recorded.
  bool success = 1;

  // Optional: Error message if logging failed.
  optional string error = 2;
}



// Claude Config Management Messages

message GetClaudeConfigRequest {
  // Filename to retrieve (e.g., "CLAUDE.md", "settings.json", "agents.md")
  string filename = 1;
}

message GetClaudeConfigResponse {
  // Configuration file data
  ClaudeConfigFile config = 1;
}

message ListClaudeConfigsRequest {
  // Empty request - returns all config files
}

message ListClaudeConfigsResponse {
  // List of all configuration files
  repeated ClaudeConfigFile configs = 1;
}

message UpdateClaudeConfigRequest {
  // Filename to update
  string filename = 1;
  // New file content
  string content = 2;
  // If true, validate JSON content before writing (for .json files)
  bool validate = 3;
}

message UpdateClaudeConfigResponse {
  // Updated configuration file data
  ClaudeConfigFile config = 1;
}

message ClaudeConfigFile {
  // Filename (e.g., "CLAUDE.md", "settings.json")
  string name = 1;
  // Absolute path to the file
  string path = 2;
  // File content
  string content = 3;
  // Last modification timestamp
  google.protobuf.Timestamp mod_time = 4;
}

// Claude Session History Messages

message ListClaudeHistoryRequest {
  // Optional project path filter
  optional string project = 1;
  // Optional search query (searches name and project)
  optional string search_query = 2;
  // Maximum number of results to return (0 = all)
  int32 limit = 3;
}

message ListClaudeHistoryResponse {
  // List of history entries
  repeated ClaudeHistoryEntry entries = 1;
  // Total count of entries (before limit applied)
  int32 total_count = 2;
}

message GetClaudeHistoryDetailRequest {
  // History entry ID
  string id = 1;
}

message GetClaudeHistoryDetailResponse {
  // Detailed history entry
  ClaudeHistoryEntry entry = 1;
}

message ClaudeHistoryEntry {
  // Unique conversation identifier
  string id = 1;
  // Conversation title/name
  string name = 2;
  // Project/directory path
  string project = 3;
  // Conversation creation timestamp
  google.protobuf.Timestamp created_at = 4;
  // Last update timestamp
  google.protobuf.Timestamp updated_at = 5;
  // Claude model used (e.g., "claude-sonnet-4")
  string model = 6;
  // Number of messages in the conversation
  int32 message_count = 7;
}

message GetClaudeHistoryMessagesRequest {
  // History entry ID (session ID)
  string id = 1;
  // Optional limit on number of messages to return
  int32 limit = 2;
  // Optional offset for pagination
  int32 offset = 3;
}

message GetClaudeHistoryMessagesResponse {
  // Messages from the conversation
  repeated ClaudeMessage messages = 1;
  // Total number of messages in the conversation
  int32 total_count = 2;
}

message ClaudeMessage {
  // Message role (user or assistant)
  string role = 1;
  // Message content (text or JSON string)
  string content = 2;
  // Message timestamp
  google.protobuf.Timestamp timestamp = 3;
  // Model used (for assistant messages)
  string model = 4;
}

// PR Tracking Messages

message GetPRInfoRequest {
  // Session identifier (must be a PR session)
  string id = 1;
}

message GetPRInfoResponse {
  // PR metadata
  PRInfo pr_info = 1;
}

message GetPRCommentsRequest {
  // Session identifier (must be a PR session)
  string id = 1;
}

message GetPRCommentsResponse {
  // List of PR comments
  repeated PRComment comments = 1;
}

message PostPRCommentRequest {
  // Session identifier (must be a PR session)
  string id = 1;
  // Comment body (required)
  string body = 2;
}

message PostPRCommentResponse {
  // Whether the comment was successfully posted
  bool success = 1;
  // Human-readable message
  string message = 2;
}

message MergePRRequest {
  // Session identifier (must be a PR session)
  string id = 1;
  // Merge method: "merge", "squash", or "rebase" (default: "merge")
  optional string method = 2;
}

message MergePRResponse {
  // Whether the PR was successfully merged
  bool success = 1;
  // Human-readable message
  string message = 2;
}

message ClosePRRequest {
  // Session identifier (must be a PR session)
  string id = 1;
}

message ClosePRResponse {
  // Whether the PR was successfully closed
  bool success = 1;
  // Human-readable message
  string message = 2;
}

// SendNotificationRequest allows tmux sessions to send notifications.
message SendNotificationRequest {
  // Session identifier sending the notification (required)
  string session_id = 1;

  // Type of notification (determines default priority and UI treatment)
  NotificationType notification_type = 2;

  // Priority level (optional, overrides default for notification type)
  NotificationPriority priority = 3;

  // Human-readable title (required)
  string title = 4;

  // Detailed message (optional)
  string message = 5;

  // Optional metadata (key-value pairs for additional context)
  // Common keys: "command", "file", "duration", "error_code"
  map<string, string> metadata = 6;
}

// SendNotificationResponse confirms notification was received.
message SendNotificationResponse {
  // Whether notification was accepted and broadcast
  bool success = 1;

  // Human-readable response message
  string message = 2;

  // Notification ID (for tracking/debugging)
  string notification_id = 3;
}
