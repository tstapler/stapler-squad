linters:
  enable:
    - forbidigo
    - ineffassign
    - nilnil
    - staticcheck
    - govet
  disable:
    - typecheck  # Disabled due to Go version mismatch with golangci-lint binary

linters-settings:
  forbidigo:
    forbid:
      - pattern: ^fmt\.Print(f|ln)?$
        msg: "use the log package instead of fmt.Print* in production code"
    exclude-godoc-examples: true

issues:
  exclude-rules:
    # Allow fmt.Print* in main.go (CLI output) and test files
    - path: "main\\.go"
      linters: [forbidigo]
    - path: "_test\\.go"
      linters: [forbidigo]
    # Allow fmt.Print* in cmd/ subdirectories (CLI output)
    - path: "^cmd/"
      linters: [forbidigo]
    # Ignore embed errors - dist folder not present during lint (built in separate job)
    - path: "server/web/embed\\.go"
      text: "no matching files found"
    # Ignore ent schema Type errors - pre-existing issue in generated code
    - path: "session/ent/schema"
      text: "\\.Type undefined"
    # Ignore Go version mismatch errors (CI uses different Go version)
    - text: "unsupported version: 2"
