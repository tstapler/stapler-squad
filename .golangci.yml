version: "2"

run:
  go: "1.23"

linters:
  default: fast
  disable:
    - cyclop     # Pre-existing complexity issues
    - funlen     # Pre-existing complexity issues
    - gocognit   # Pre-existing complexity issues
    - nestif     # Pre-existing complexity issues
    - funcorder  # Pre-existing complexity issues
    - depguard   # Pre-existing issues
    - lll        # Pre-existing issues
    - mnd        # Pre-existing issues (magic numbers)
    - wsl        # Pre-existing issues (whitespace)
