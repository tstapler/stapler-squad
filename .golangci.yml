linters:
  enable:
    - forbidigo
    - ineffassign
    - nilnil
    - staticcheck
    - govet
    - typecheck

linters-settings:
  forbidigo:
    forbid:
      - pattern: ^fmt\.Print(f|ln)?$
        msg: "use the log package instead of fmt.Print* in production code"
    exclude-godoc-examples: true

issues:
  exclude-rules:
    # Allow fmt.Print* in main.go (CLI output) and test files
    - path: "main\\.go"
      linters: [forbidigo]
    - path: "_test\\.go"
      linters: [forbidigo]
    # Allow fmt.Print* in cmd/ subdirectories (CLI output)
    - path: "^cmd/"
      linters: [forbidigo]
